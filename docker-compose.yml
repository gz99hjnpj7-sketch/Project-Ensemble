services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: future_news
      POSTGRES_USER: future_news
      POSTGRES_PASSWORD: future_news
    ports:
      - "5432:5432"
    volumes:
      - future_news_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U future_news -d future_news"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  future_news_pg:
